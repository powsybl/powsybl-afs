name: Snapshot CI

on:
  workflow_dispatch:
  schedule:
    - cron: '20 3 * * *'

permissions: {}

jobs:
  build_powsybl_afs:
    name: Build Java ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
      fail-fast: false
    defaults:
      run:
        shell: bash

    steps:
      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '21'

      # Define script path variable
      - name: Set up script path
        id: script_path_setup
        env:
          MATRIX_OS: ${{ matrix.os }}
        run: |
          SCRIPTS_PATH="${GITHUB_WORKSPACE}/scripts/.github/workflows/scripts"
          if [[ "$MATRIX_OS" == "windows-latest" ]]; then
            SCRIPTS_PATH=$(echo "$SCRIPTS_PATH" | sed 's/\\/\//g')
          fi
          echo "SCRIPTS_PATH=$SCRIPTS_PATH" >> $GITHUB_OUTPUT  

      # Build powsybl-core on main branch
      - name: Checkout core sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: powsybl/powsybl-core
          ref: main
          path: powsybl-core
          persist-credentials: false

      - name: Build powsybl-core
        run: mvn -batch-mode --no-transfer-progress clean install -DskipTests
        working-directory: ./powsybl-core

      - name: Get powsybl-core version
        id: get_core_version
        run: echo "CORE_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT
        working-directory: ./powsybl-core

      # Checkout script
      # The script check_snapshot_branch.sh is located in the workflow folder of the repository
      # It is necessary for checking out the integration branch if it exists
      - name: Checkout script
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
         sparse-checkout: |
           .github
         sparse-checkout-cone-mode: false
         path: scripts
         persist-credentials: false

      # Build powsybl-afs
      - name: Checking for powsybl-afs snapshot branch
        env:
          SCRIPTS_PATH: ${{ steps.script_path_setup.outputs.SCRIPTS_PATH }}
          CORE_VERSION: ${{ steps.get_core_version.outputs.CORE_VERSION }}
        run: $SCRIPTS_PATH/check_snapshot_branch.sh "https://github.com/powsybl/powsybl-afs.git" $CORE_VERSION

      - name: Checkout powsybl-afs
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: powsybl/powsybl-afs
          ref: ${{ env.SNAPSHOT_BRANCH }}
          path: powsybl-afs
          submodules: true
          persist-credentials: false

      - name: update pom.xml
        env:
          CORE_VERSION: ${{ steps.get_core_version.outputs.CORE_VERSION }}
        run: mvn versions:set-property -Dproperty=powsyblcore.version -DnewVersion=$CORE_VERSION -DgenerateBackupPoms=false
        working-directory: ./powsybl-afs

      - name: Build with Maven (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        working-directory: ./powsybl-afs
        run: ./mvnw --batch-mode -Pjacoco install

      - name: Build with Maven (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: .\powsybl-afs
        run: ./mvnw.cmd --batch-mode install
        shell: pwsh

      - name: Store job result
        if: always()
        env:
          MATRIX_OS: ${{ matrix.os }}
          JOB_STATUS: ${{ job.status }}
        run: |
          echo "$MATRIX_OS=$JOB_STATUS" >> "job_result_$MATRIX_OS.txt"

      - name: Upload job result
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: job-results_${{ matrix.os }}
          path: job_result_${{ matrix.os }}.txt

    outputs:
      core-version: ${{ steps.get_core_version.outputs.CORE_VERSION }}
      afs-branch: ${{ env.SNAPSHOT_BRANCH }}

  # Slack notification
  notify_slack:
    needs: build_powsybl_afs
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download job results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1

      - name: Combine job results
        run: |
          for dir in job-results_*; do
            cat "$dir"/* >> combined_job_results.txt
          done

      - name: Determine workflow status
        id: workflow_status
        run: |
          if grep -q "failure" combined_job_results.txt; then
            echo "icon=❌" >> $GITHUB_OUTPUT
            echo "status=Failed" >> $GITHUB_OUTPUT
          else
            echo "icon=✅" >> $GITHUB_OUTPUT
            echo "status=Successful" >> $GITHUB_OUTPUT
          fi

      - name: Format job results
        id: format_results
        run: |
          formatted=""
          while IFS='=' read -r os status; do
            icon=$([ "$status" == "success" ] && echo ":white_check_mark:" || echo ":x:")
            formatted+="${icon} Build powsybl-afs on *${os}*\\n"
          done < combined_job_results.txt
          formatted="${formatted%\\n}"  # Remove the last newline
          echo "formatted_results=${formatted}" >> $GITHUB_OUTPUT

      - name: Prepare Slack payload
        id: prepare_payload
        env:
          WORKFLOW_STATUS: ${{ steps.workflow_status.outputs.status }}
          WORKFLOW_ICON: ${{ steps.workflow_status.outputs.icon }}
          AFS_BRANCH: ${{ needs.build_powsybl_afs.outputs.afs-branch }}
          CORE_VERSION: ${{ needs.build_powsybl_afs.outputs.core-version }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          FORMATTED_RESULTS: ${{ steps.format_results.outputs.formatted_results }}
        run: |
          if [ "$WORKFLOW_STATUS" == "Successful" ]; then
            echo 'payload<<EOF' >> $GITHUB_OUTPUT
            echo '{
              "attachments": [{
                "color": "#319f4b",
                "blocks": [
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "'"$WORKFLOW_ICON"' *'"$WORKFLOW_STATUS"' workflow: Snapshot-CI on <https://github.com/powsybl/powsybl-afs|powsybl-afs>*\n\nBranch built: '"$AFS_BRANCH"'\nPowSyBl-Core version used: '"$CORE_VERSION"'\n\nSee logs on <https://github.com/'"$GITHUB_REPOSITORY"'/actions/runs/'"$GITHUB_RUN_ID"'|GitHub>"
                    }
                  }
                ]
              }]
            }' >> $GITHUB_OUTPUT
            echo 'EOF' >> $GITHUB_OUTPUT
          else
            echo 'payload<<EOF' >> $GITHUB_OUTPUT
            echo '{
              "attachments": [{
                "color": "#f64538",
                "blocks": [
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "'"$WORKFLOW_ICON"' *'"$WORKFLOW_STATUS"' workflow: Snapshot-CI on <https://github.com/powsybl/powsybl-afs|powsybl-afs>*\n\nBranch built: '"$AFS_BRANCH"'\nPowSyBl-Core version used: '"$CORE_VERSION"'"
                    }
                  },
                  {
                    "type": "divider"
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*Workflow details:*\n\n'"$FORMATTED_RESULTS"'\n\n@channel - See logs on <https://github.com/'"$GITHUB_REPOSITORY"'/actions/runs/'"$GITHUB_RUN_ID"'|GitHub>"
                    }
                  }
                ]
              }]
            }' >> $GITHUB_OUTPUT
            echo 'EOF' >> $GITHUB_OUTPUT
          fi

      - name: Send Slack Notification
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2.1.1
        if: ${{ steps.workflow_status.outputs.status != 'Successful' || github.event_name == 'workflow_dispatch' }}
        with:
          webhook: ${{ secrets.SLACK_POWSYBL_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: ${{ steps.prepare_payload.outputs.payload }}
